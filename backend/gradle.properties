# 로컬 개발 메모: 로컬에서 Gradle 8.11.1 + Java 25를 사용하면
# Groovy 3.x가 Java 25 class file을 파싱하지 못하는 호환성 문제 발생
# CI는 Java 17을 사용하므로 문제없음
# 로컬 실행 시 Java 21로 Gradle 실행 필요:
#   JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk-21.jdk/Contents/Home ./gradlew ...
# 또는 Homebrew Java를 Java 21로 변경:
#   brew unlink openjdk && brew link openjdk@21
