<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — TimeManager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3350;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 0 16px;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.4px;
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-control:focus { border-color: var(--accent); }

    .btn-submit {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--accent-hover); }

    .error-msg {
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 7px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .logout-msg {
      padding: 10px 14px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 7px;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-name">TimeManager</div>
    <div class="brand-sub">Admin Console</div>
  </div>

  <div class="card">
    <h2 class="card-title">로그인</h2>

    <div th:if="${param.error}" class="error-msg">
      이메일 또는 비밀번호가 올바르지 않습니다.
    </div>

    <div th:if="${param.logout}" class="logout-msg">
      로그아웃되었습니다.
    </div>

    <form th:action="@{/admin/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label" for="username">이메일</label>
        <input class="form-control" type="email" id="username" name="username"
               placeholder="admin@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn-submit" type="submit">로그인</button>
    </form>
  </div>
</div>
</body>
</html>
