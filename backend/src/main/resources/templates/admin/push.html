<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::body}, 'Push 알림', 'push')}"
      lang="ko">
<body>

<div class="two-col">

  <div class="card">
    <div class="card-title">전체 발송</div>
    <p class="text-muted mb-4"
       th:text="'현재 ' + ${subscriberCount} + '개 기기에 발송됩니다.'"></p>
    <form th:action="@{/admin/push/all}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label" for="allTitle">제목</label>
        <input class="form-control" type="text" id="allTitle" name="title"
               placeholder="알림 제목" required maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label" for="allBody">내용</label>
        <textarea class="form-control" id="allBody" name="body"
                  placeholder="알림 내용" required maxlength="300"
                  rows="4" style="resize:vertical;"></textarea>
      </div>
      <button type="submit" class="btn btn-primary"
              onclick="return confirm('전체 구독자에게 Push를 발송하시겠습니까?')">
        전체 발송
      </button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">특정 멤버 발송</div>
    <p class="text-muted mb-4">선택한 멤버의 모든 구독 기기로 발송됩니다.</p>
    <form th:action="@{/admin/push/member}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label" for="memberId">멤버 선택</label>
        <select class="form-control" id="memberId" name="memberId" required>
          <option value="">— 멤버 선택 —</option>
          <option th:each="m : ${members}"
                  th:value="${m.id.value()}"
                  th:text="${m.name + ' (' + m.email + ')'}"></option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="memberTitle">제목</label>
        <input class="form-control" type="text" id="memberTitle" name="title"
               placeholder="알림 제목" required maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label" for="memberBody">내용</label>
        <textarea class="form-control" id="memberBody" name="body"
                  placeholder="알림 내용" required maxlength="300"
                  rows="4" style="resize:vertical;"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">발송</button>
    </form>
  </div>

</div>

</body>
</html>
