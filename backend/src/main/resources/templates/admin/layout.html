<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, pageTitle, activePage)"
      lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' — TimeManager Admin'">TimeManager Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3350;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --sidebar-w: 220px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-brand {
      padding: 24px 20px 16px;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.3px;
    }

    .sidebar-brand span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 11px;
      display: block;
      margin-top: 2px;
    }

    .sidebar-nav { flex: 1; padding: 12px 0; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s, background 0.15s;
    }

    .sidebar-nav a:hover { color: var(--text); background: var(--surface-2); }
    .sidebar-nav a.active { color: var(--accent); background: rgba(99,102,241,0.08); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .sidebar-footer a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-footer a:hover { color: var(--danger); }

    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }

    .topbar { padding: 20px 32px 0; }

    .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; }

    .content { padding: 24px 32px 48px; flex: 1; }

    .flash {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      border: 1px solid;
    }

    .flash-success { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--success); }
    .flash-error   { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3);  color: var(--danger); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
    .card-title { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }

    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .stat-value.accent  { color: var(--accent); }
    .stat-value.warning { color: var(--warning); }
    .stat-value.success { color: var(--success); }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--surface-2); }

    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-admin   { background: rgba(99,102,241,0.15); color: var(--accent); }
    .badge-member  { background: rgba(100,116,139,0.15); color: var(--text-muted); }
    .badge-running { background: rgba(245,158,11,0.15); color: var(--warning); }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: 1px solid transparent; font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-danger { background: transparent; color: var(--danger); border-color: rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-warning { background: transparent; color: var(--warning); border-color: rgba(245,158,11,0.3); }
    .btn-warning:hover { background: rgba(245,158,11,0.1); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .form-control { width: 100%; padding: 8px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.15s; }
    .form-control:focus { border-color: var(--accent); }
    select.form-control { cursor: pointer; }

    .pagination { display: flex; align-items: center; gap: 6px; margin-top: 20px; justify-content: center; }
    .page-link { padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); color: var(--text-muted); text-decoration: none; font-size: 12px; transition: all 0.15s; }
    .page-link:hover { border-color: var(--accent); color: var(--accent); }
    .page-link.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-link.disabled { pointer-events: none; opacity: 0.3; }

    .inline-form { display: inline; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 15px; font-weight: 600; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .text-muted { color: var(--text-muted); font-size: 12px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    TimeManager
    <span>Admin Console</span>
  </div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}" th:class="${activePage == 'dashboard'} ? 'active' : ''">
      <span class="nav-icon">◈</span> 대시보드
    </a>
    <a th:href="@{/admin/members}" th:class="${activePage == 'members'} ? 'active' : ''">
      <span class="nav-icon">◎</span> 멤버 관리
    </a>
    <a th:href="@{/admin/timers}" th:class="${activePage == 'timers'} ? 'active' : ''">
      <span class="nav-icon">◷</span> 타이머 감지
    </a>
    <a th:href="@{/admin/push}" th:class="${activePage == 'push'} ? 'active' : ''">
      <span class="nav-icon">◉</span> Push 알림
    </a>
  </nav>
  <div class="sidebar-footer">
    <a th:href="@{/admin/logout}"><span>⏻</span> 로그아웃</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1 class="page-title" th:text="${pageTitle}">대시보드</h1>
  </div>
  <div class="content">
    <div th:if="${successMessage}" class="flash flash-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="flash flash-error"   th:text="${errorMessage}"></div>
    <th:block th:replace="${content}"/>
  </div>
</div>

</body>
</html>
