<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::body}, '대시보드', 'dashboard')}"
      lang="ko">
<body>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">전체 멤버</div>
    <div class="stat-value accent" th:text="${totalMembers}">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">장기 실행 타이머</div>
    <div class="stat-value"
         th:classappend="${stalledTimerCount > 0} ? ' warning' : ' success'"
         th:text="${stalledTimerCount}">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Push 구독자</div>
    <div class="stat-value success" th:text="${pushSubscriberCount}">0</div>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div class="card-title">빠른 이동</div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <a th:href="@{/admin/members}" class="btn btn-ghost" style="justify-content:flex-start;">
        <span>◎</span> 멤버 목록 보기
      </a>
      <a th:href="@{/admin/timers}" class="btn btn-ghost" style="justify-content:flex-start;">
        <span>◷</span> 장기 실행 타이머 확인
      </a>
      <a th:href="@{/admin/push}" class="btn btn-ghost" style="justify-content:flex-start;">
        <span>◉</span> Push 알림 발송
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-title">상태 요약</div>
    <div style="font-size:13px; line-height:2; color:var(--text-muted);">
      <div>전체 멤버:
        <span style="color:var(--text); font-weight:600;" th:text="${totalMembers}">0</span>명
      </div>
      <div>장기 실행 타이머 (2h+):
        <span th:style="${stalledTimerCount > 0} ? 'color:var(--warning); font-weight:600;' : 'color:var(--success); font-weight:600;'"
              th:text="${stalledTimerCount}">0</span>개
      </div>
      <div>Push 구독:
        <span style="color:var(--success); font-weight:600;" th:text="${pushSubscriberCount}">0</span>개
      </div>
    </div>
  </div>
</div>

</body>
</html>
