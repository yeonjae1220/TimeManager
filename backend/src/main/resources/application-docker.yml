spring:
  datasource:
    url: jdbc:postgresql://db:5432/${DB_NAME:timemanager}
    username: ${DB_USER:timemanager}
    password: ${DB_PASSWORD:timemanager}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # 프로덕션 — 스키마 자동 변경 불허
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: redis
      port: 6379

# cors.allowed-origins 미설정 — 프론트·백이 같은 ingress 호스트를 공유하므로 CORS 불필요

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo
