spring:
  datasource:
    url: jdbc:postgresql://db:5432/${DB_NAME:timemanager}
    username: ${DB_USER:timemanager}
    password: ${DB_PASSWORD:timemanager}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # 프로덕션 — 스키마 자동 변경 불허
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# 허용 오리진: 환경변수로 프론트엔드 URL을 주입하세요. 예) FRONTEND_URL=https://app.example.com
# 여러 오리진이 필요할 경우 쉼표로 구분하세요. 예) https://app.example.com,https://www.example.com
cors:
  allowed-origins: ${FRONTEND_URL}
  data:
    redis:
      host: redis
      port: 6379

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo
