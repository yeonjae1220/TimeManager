spring:
  # ⚠ 기동 프로필은 JVM 옵션 -Dspring.profiles.active=<env> 로 명시하세요.
  #   미설정 시 datasource·cors 등 필수 프로퍼티가 없어 기동 실패합니다.
  jpa:
    hibernate:
      ddl-auto: validate   # 프로덕션 기본값 — 스키마 변경 차단
    properties:
      hibernate:
        # show_sql: true
        format_sql: true
        spring.jpa.properties.hibernate.use_sql_comments: true
  thymeleaf:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.hibernate.SQL: debug
    # org.hibernate.type: trace
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId:--}] [%X{memberId:--}] %logger{36} - %msg%n"

# ── VAPID Push 알림 설정 ──────────────────────────────────────────────
push:
  vapid:
    publicKey: ${PUSH_VAPID_PUBLIC_KEY}
    privateKey: ${PUSH_VAPID_PRIVATE_KEY}
    subject: ${PUSH_VAPID_SUBJECT:mailto:admin@example.com}

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-minutes: 15
  refresh-token-ttl-minutes: 10080

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo