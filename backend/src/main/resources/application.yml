spring:
  # ⚠ 기동 프로필은 JVM 옵션 -Dspring.profiles.active=<env> 로 명시하세요.
  #   미설정 시 datasource·cors 등 필수 프로퍼티가 없어 기동 실패합니다.
  application:
    name: timemanager
  flyway:
    enabled: false          # 로컬/테스트 기본 비활성화 — docker 프로필에서 활성화
    baseline-on-migrate: true   # 기존 DB에 flyway_schema_history 없을 때 베이스라인 생성
    baseline-version: 3         # V1~V3은 deploy.yml로 적용 완료 — 재실행 방지
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate   # 프로덕션 기본값 — 스키마 변경 차단
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.hibernate.SQL: debug
    # org.hibernate.type: trace
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId:--}] [%X{memberId:--}] %logger{36} - %msg%n"

# ── VAPID Push 알림 설정 ──────────────────────────────────────────────
push:
  vapid:
    publicKey: ${PUSH_VAPID_PUBLIC_KEY}
    privateKey: ${PUSH_VAPID_PRIVATE_KEY}
    subject: ${PUSH_VAPID_SUBJECT:mailto:admin@example.com}

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-minutes: 15
  refresh-token-ttl-minutes: 43200

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://www.googleapis.com/oauth2/v3/userinfo

app:
  rate-limit:
    login-limit: ${RATE_LIMIT_LOGIN:10}
    refresh-limit: ${RATE_LIMIT_REFRESH:30}
    register-limit: ${RATE_LIMIT_REGISTER:5}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:600}
  # 신뢰 프록시(nginx-ingress 등)의 IP에서 온 요청만 X-Forwarded-For 헤더를 신뢰.
  # 그렇지 않으면 클라이언트가 헤더를 위조해 IP 기반 rate limit을 우회할 수 있음.
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:127.0.0.1,::1}

admin:
  email: ${ADMIN_EMAIL:admin@timemanager.local}
  password:
    bcrypt: ${ADMIN_PASSWORD_BCRYPT:$2a$10$placeholder-must-be-overridden-in-prod}

lab:
  feedback:
    endpoint: ${LAB_FEEDBACK_ENDPOINT:http://lab-dashboard.lab.svc.cluster.local/api/internal/feedback}
    token: ${LAB_FEEDBACK_TOKEN:}
    app-name: timemanager