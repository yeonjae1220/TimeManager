spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:tcp://localhost/~/timer
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        # show_sql: true
        format_sql: true
        spring.jpa.properties.hibernate.use_sql_comments: true
  thymeleaf:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging.level:
  org.hibernate.SQL: debug
  # org.hibernate.type: trace

# ── VAPID Push 알림 설정 ──────────────────────────────────────────────
push:
  vapid:
    publicKey: ${PUSH_VAPID_PUBLIC_KEY}
    privateKey: ${PUSH_VAPID_PRIVATE_KEY}
    subject: ${PUSH_VAPID_SUBJECT:mailto:admin@example.com}

jwt:
  secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LW9ubHk=}
  access-token-ttl-minutes: 15
  refresh-token-ttl-minutes: 10080