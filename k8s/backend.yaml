apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: timemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        project-timemanager: "true"
      containers:
        - name: backend
          image: ghcr.io/yeonjae1220/timemanager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: JWT_SECRET
            - name: PUSH_VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: PUSH_VAPID_PUBLIC_KEY
            - name: PUSH_VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: PUSH_VAPID_PRIVATE_KEY
            - name: PUSH_VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: PUSH_VAPID_SUBJECT
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: timemanager-google-secret
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: timemanager-google-secret
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: ADMIN_PASSWORD_BCRYPT
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            # nginx-ingress 파드의 IP에서 온 요청만 X-Forwarded-For를 신뢰 (스푸핑 방지).
            # k3s/flannel 기본 파드 CIDR — 운영 환경에서 `kubectl get pods -n kube-system -o wide`로
            # 실제 ingress-nginx 파드 대역을 확인해 필요 시 갱신할 것 (CIDR 표기 지원).
            - name: TRUSTED_PROXY_IPS
              value: "127.0.0.1,::1,10.42.0.0/16"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: timemanager
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
