apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: timemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        project-timemanager: "true"
      containers:
        - name: backend
          image: ghcr.io/yeonjae1220/timemanager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: JWT_SECRET
            - name: PUSH_VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: PUSH_VAPID_PUBLIC_KEY
            - name: PUSH_VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: PUSH_VAPID_PRIVATE_KEY
            - name: PUSH_VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: timemanager-secret
                  key: PUSH_VAPID_SUBJECT
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: timemanager-google-secret
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: timemanager-google-secret
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: FRONTEND_URL
              value: "http://timemanager.local"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: timemanager
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
