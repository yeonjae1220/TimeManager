apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: timemanager-ingress
  namespace: timemanager
spec:
  ingressClassName: nginx
  rules:
    - host: timemanager.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
