name: CI/CD Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yeonjae1220/timemanager

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build and test with Gradle
        working-directory: backend
        run: ./gradlew build --no-daemon

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-and-push-frontend:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.VUE_APP_GOOGLE_CLIENT_ID }}

  deploy:
    name: Deploy to Lenovo Server
    # self-hosted runner가 lenovo에서 직접 실행 — SSH 불필요
    runs-on: [self-hosted, homelab]
    needs: [build-and-push, build-and-push-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Apply k8s secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PUSH_VAPID_PUBLIC_KEY: ${{ secrets.PUSH_VAPID_PUBLIC_KEY }}
          PUSH_VAPID_PRIVATE_KEY: ${{ secrets.PUSH_VAPID_PRIVATE_KEY }}
          PUSH_VAPID_SUBJECT: ${{ secrets.PUSH_VAPID_SUBJECT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_BCRYPT: ${{ secrets.ADMIN_PASSWORD_BCRYPT }}
          CONSOLE_INTERNAL_TOKEN: ${{ secrets.CONSOLE_INTERNAL_TOKEN }}
          LAB_FEEDBACK_TOKEN: ${{ secrets.LAB_FEEDBACK_TOKEN }}
        run: |
          sudo kubectl create secret generic timemanager-secret \
            --from-literal=DB_NAME="timemanager" \
            --from-literal=DB_USER="timemanager" \
            --from-literal=DB_PASSWORD="${DB_PASSWORD}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=PUSH_VAPID_PUBLIC_KEY="${PUSH_VAPID_PUBLIC_KEY}" \
            --from-literal=PUSH_VAPID_PRIVATE_KEY="${PUSH_VAPID_PRIVATE_KEY}" \
            --from-literal=PUSH_VAPID_SUBJECT="${PUSH_VAPID_SUBJECT}" \
            --from-literal=ADMIN_EMAIL="${ADMIN_EMAIL}" \
            --from-literal=ADMIN_PASSWORD_BCRYPT="${ADMIN_PASSWORD_BCRYPT}" \
            --from-literal=CONSOLE_INTERNAL_TOKEN="${CONSOLE_INTERNAL_TOKEN}" \
            --from-literal=LAB_FEEDBACK_TOKEN="${LAB_FEEDBACK_TOKEN}" \
            -n timemanager --dry-run=client -o yaml | sudo kubectl apply -f -

          sudo kubectl create secret generic timemanager-google-secret \
            --from-literal=GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
            -n timemanager --dry-run=client -o yaml | sudo kubectl apply -f -

      - name: Deploy images
        run: |
          set -e

          sudo kubectl set image deployment/backend \
            backend=ghcr.io/yeonjae1220/timemanager:latest \
            -n timemanager

          sudo kubectl set image deployment/frontend \
            frontend=ghcr.io/yeonjae1220/timemanager-frontend:latest \
            -n timemanager

          sudo kubectl rollout restart deployment/backend -n timemanager
          sudo kubectl rollout restart deployment/frontend -n timemanager

          if ! sudo kubectl rollout status deployment/backend \
            -n timemanager --timeout=300s; then
            echo "=== Pod status ==="
            sudo kubectl get pods -n timemanager -l app=backend -o wide
            sudo kubectl get events -n timemanager --sort-by='.lastTimestamp' | tail -20
            NEW_POD=$(sudo kubectl get pods -n timemanager -l app=backend \
              --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
            sudo kubectl logs "$NEW_POD" -n timemanager --tail=50 2>/dev/null || true
            sudo kubectl describe pod "$NEW_POD" -n timemanager | tail -30
            exit 1
          fi

          if ! sudo kubectl rollout status deployment/frontend \
            -n timemanager --timeout=300s; then
            echo "=== Frontend pod status ==="
            sudo kubectl get pods -n timemanager -l app=frontend -o wide
            NEW_POD=$(sudo kubectl get pods -n timemanager -l app=frontend \
              --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
            sudo kubectl logs "$NEW_POD" -n timemanager --tail=50 2>/dev/null || true
            sudo kubectl describe pod "$NEW_POD" -n timemanager | tail -30
            exit 1
          fi
