name: CI/CD Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yeonjae1220/timemanager

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build and test with Gradle
        working-directory: backend
        run: ./gradlew build --no-daemon

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-and-push-frontend:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VUE_APP_GOOGLE_CLIENT_ID=${{ secrets.VUE_APP_GOOGLE_CLIENT_ID }}

  deploy:
    name: Deploy to Lenovo Server
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.LENOVO_HOST }}
          port: ${{ secrets.LENOVO_PORT }}
          username: ${{ secrets.LENOVO_USER }}
          key: ${{ secrets.LENOVO_SSH_KEY }}
          envs: GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -e

            # Upsert k8s Secret with Google OAuth credentials
            sudo kubectl create secret generic timemanager-google-secret \
              --from-literal=GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
              --from-literal=GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
              -n timemanager \
              --dry-run=client -o yaml | sudo kubectl apply -f -

            # Ensure imagePullPolicy is Always (images are public — no imagePullSecrets needed)
            sudo kubectl patch deployment backend \
              -n timemanager \
              -p '{"spec":{"template":{"spec":{"containers":[{"name":"backend","imagePullPolicy":"Always"}]}}}}'

            sudo kubectl patch deployment frontend \
              -n timemanager \
              -p '{"spec":{"template":{"spec":{"containers":[{"name":"frontend","imagePullPolicy":"Always"}]}}}}'

            # Restart both deployments to pick up new images
            sudo kubectl rollout restart deployment/backend -n timemanager
            sudo kubectl rollout restart deployment/frontend -n timemanager

            if ! sudo kubectl rollout status deployment/backend \
              -n timemanager --timeout=300s; then
              echo "=== Pod status ==="
              sudo kubectl get pods -n timemanager -l app=backend -o wide
              echo "=== Recent events ==="
              sudo kubectl get events -n timemanager --sort-by='.lastTimestamp' | tail -20
              echo "=== Pod logs (new pod) ==="
              NEW_POD=$(sudo kubectl get pods -n timemanager -l app=backend \
                --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
              sudo kubectl logs "$NEW_POD" -n timemanager --tail=50 2>/dev/null || true
              sudo kubectl describe pod "$NEW_POD" -n timemanager | tail -30
              exit 1
            fi

            if ! sudo kubectl rollout status deployment/frontend \
              -n timemanager --timeout=300s; then
              echo "=== Frontend pod status ==="
              sudo kubectl get pods -n timemanager -l app=frontend -o wide
              NEW_POD=$(sudo kubectl get pods -n timemanager -l app=frontend \
                --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
              sudo kubectl logs "$NEW_POD" -n timemanager --tail=50 2>/dev/null || true
              sudo kubectl describe pod "$NEW_POD" -n timemanager | tail -30
              exit 1
            fi
